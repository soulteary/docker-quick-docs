version: "3"

services:
  docker-quick-docs:
    image: soulteary/docker-quick-docs:v0.1.8
    restart: always
    ports:
      - 8080:8080
    volumes:
      - ./docs:/app/docs
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
